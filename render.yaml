services:
  - type: web
    name: petstore-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PGHOST
        value: pg4.sweb.ru
      - key: PGPORT
        value: "5433"
      - key: PGUSER
        value: ramaldano2
      - key: PGDATABASE
        value: ramaldano2
      - key: PGPASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_DIR
        value: ./logs

  - type: web
    name: petstore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://petstore-backend-9s3h.onrender.com
    # SPA: все маршруты отдаём index.html (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
